.container{width:400px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);overflow:hidden}
.tabs{display:flex;border-bottom:1px solid #e8e8e8}
.tab{flex:1;text-align:center;padding:16px;cursor:pointer;font-size:15px;font-weight:500;color:#888;background:#fafafa;border:none;outline:none;transition:.2s}
.tab.active{color:#1a73e8;background:#fff;border-bottom:2px solid #1a73e8}
.form-wrap{padding:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;color:#555;font-weight:500}
.form-group input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#1a73e8}
.btn{width:100%;padding:11px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.error{background:#fef2f2;color:#dc2626;padding:10px 12px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
.footer{text-align:center;padding:16px 16px 4px;font-size:12px;color:#999;border-top:1px solid #f0f0f0}

<body>
<div style="text-align:center">
<div style="font-size:48px;font-weight:900;color:#1a1a1a;letter-spacing:2px;margin-bottom:8px">MagicGateway</div>
<div style="font-size:14px;color:#888;font-weight:400">企业 DeepSeek API 网关</div>
</div>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="switchTab('login')">登录</button>
<button class="tab" onclick="switchTab('register')">注册</button>
</div>
<div class="form-wrap">
<div class="error" id="error"></div>
<form id="loginForm" onsubmit="handleLogin(event)">
<div class="form-group"><label>用户名</label><input type="text" id="loginUser" required autocomplete="username"></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPass" required autocomplete="current-password"></div>
<button type="submit" class="btn btn-primary">登 录</button>
</form>
<form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
<div class="form-group"><label>用户名</label><input type="text" id="regUser" required minlength="2" maxlength="32" autocomplete="username" placeholder="请使用中文本名注册账号"></div>
<div class="form-group"><label>密码</label><input type="password" id="regPass" required minlength="6" autocomplete="new-password"></div>
<div class="form-group"><label>确认密码</label><input type="password" id="regPass2" required minlength="6" autocomplete="new-password"></div>
<button type="submit" class="btn btn-primary">注 册</button>
</form>
</div>
<div class="footer" id="footerVersion">MagicGateway</div>
<div style="text-align:center;padding:0 16px 24px;font-size:12px;color:#aaa">版权归深圳美丽魔方机器人有限公司所有</div>
</div>
<script>
fetch('/health').then(r=>r.json()).then(d=>{document.getElementById('footerVersion').textContent='MagicGateway v'+d.version}).catch(()=>{});
let mode='login';
function switchTab(t){mode=t;document.querySelectorAll('.tab').forEach((e,i)=>{e.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register'))});document.getElementById('loginForm').style.display=t==='login'?'block':'none';document.getElementById('registerForm').style.display=t==='register'?'block':'none';hideError()}
function showError(m){var e=document.getElementById('error');e.textContent=m;e.style.display='block'}
function hideError(){document.getElementById('error').style.display='none'}
async function handleLogin(e){e.preventDefault();hideError();
var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
if(!u||!p){showError('请输入用户名和密码');return}
try{var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
var d=await r.json();
if(!r.ok){showError(d.error||'登录失败');return}
localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));
location.href=d.user.role==='admin'?'/admin':'/dashboard'
}catch(err){showError('网络错误')}}
async function handleRegister(e){e.preventDefault();hideError();
var u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPass').value,p2=document.getElementById('regPass2').value;
if(!u||!p){showError('请输入用户名和密码');return}
if(p!==p2){showError('两次密码不一致');return}
try{var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
var d=await r.json();
if(!r.ok){showError(d.error||'注册失败');return}
localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));
location.href='/dashboard'
}catch(err){showError('网络错误')}}
</script>
